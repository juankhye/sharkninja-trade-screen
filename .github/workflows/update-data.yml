name: Update Dashboard Data

on:
  schedule:
    # Run weekdays at 6 AM UTC (after US market close ET)
    - cron: '0 6 * * 1-5'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance pytrends fredapi requests praw

      - name: Fetch data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          KEEPA_API_KEY: ${{ secrets.KEEPA_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: python scripts/fetch_data.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live-data.json
          git diff --cached --quiet || git commit -m "Auto-update live data $(date -u +%Y-%m-%d)"
          git push
